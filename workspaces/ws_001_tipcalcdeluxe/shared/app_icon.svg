<?xml version="1.0" encoding="UTF-8"?>
<!--
  Tip Calculator Deluxe - 1024x1024 master app icon.
  Motif: a tilted paper receipt with a green tip coin. Distinctive diagonal
  composition so it reads uniquely among other utility apps.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A84FF"/>
      <stop offset="1" stop-color="#0052CC"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5BE584"/>
      <stop offset="1" stop-color="#1E9E45"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#001A40" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded background tile -->
  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>

  <!-- Subtle highlight sweep -->
  <path d="M0 0 H1024 V360 Q512 540 0 360 Z" fill="#FFFFFF" opacity="0.08"/>

  <!-- Receipt, slightly rotated for a dynamic look -->
  <g transform="rotate(-9 470 520)" filter="url(#soft)">
    <!-- Receipt body with a zig-zag torn bottom edge -->
    <path fill="#FFFFFF" d="
      M286 250
      H654
      V690
      l-46 36 -46 -36 -46 36 -46 -36 -46 36 -46 -36 -46 36 -46 -36
      Z"/>

    <!-- Header bar -->
    <rect x="332" y="312" width="276" height="34" rx="17" fill="#0A84FF"/>

    <!-- Line items -->
    <rect x="332" y="392" width="210" height="24" rx="12" fill="#C7D8F0"/>
    <rect x="566" y="392" width="42"  height="24" rx="12" fill="#0A84FF"/>
    <rect x="332" y="448" width="180" height="24" rx="12" fill="#C7D8F0"/>
    <rect x="566" y="448" width="42"  height="24" rx="12" fill="#0A84FF"/>
    <rect x="332" y="504" width="150" height="24" rx="12" fill="#C7D8F0"/>
    <rect x="566" y="504" width="42"  height="24" rx="12" fill="#0A84FF"/>

    <!-- Total divider + total line -->
    <rect x="332" y="566" width="276" height="6" rx="3" fill="#9DB6DC"/>
    <rect x="332" y="592" width="120" height="30" rx="15" fill="#0A84FF"/>
    <rect x="498" y="592" width="110" height="30" rx="15" fill="#1E9E45"/>
  </g>

  <!-- Tip coin overlapping the receipt's lower-right corner -->
  <g filter="url(#soft)">
    <circle cx="690" cy="700" r="168" fill="url(#coin)"/>
    <circle cx="690" cy="700" r="168" fill="none" stroke="#0F7A33" stroke-width="14"/>
    <circle cx="690" cy="700" r="126" fill="none" stroke="#0F7A33" stroke-width="10" opacity="0.55"/>

    <!-- Dollar glyph -->
    <path fill="#FFFFFF" d="
      M676 600
      h28
      v28
      c34 6 56 28 56 60
      h-44
      c0 -16 -12 -26 -26 -26
      c-16 0 -28 8 -28 22
      c0 16 12 22 40 30
      c44 12 62 32 62 66
      c0 34 -24 56 -60 62
      v28
      h-28
      v-28
      c-38 -6 -62 -30 -62 -64
      h44
      c0 18 14 30 32 30
      c18 0 30 -10 30 -24
      c0 -16 -12 -22 -42 -30
      c-42 -12 -60 -32 -60 -64
      c0 -32 22 -54 56 -60
      Z"/>
  </g>

</svg>
