name: TipCalculatorDeluxe

options:
  bundleIdPrefix: com.appfactory
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.42.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  TipCalculatorDeluxe:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: TipCalculatorDeluxe
    info:
      path: TipCalculatorDeluxe/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.appfactory.tipcalcdeluxe
        PRODUCT_NAME: TipCalculatorDeluxe
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: YES

schemes:
  TipCalculatorDeluxe:
    build:
      targets:
        TipCalculatorDeluxe: all
    run:
      config: Debug
    archive:
      config: Release
