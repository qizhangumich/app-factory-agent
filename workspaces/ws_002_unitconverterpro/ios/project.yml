name: UnitConverterPro

options:
  bundleIdPrefix: com.appfactory
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.40.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  UnitConverterPro:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: UnitConverterPro
    info:
      path: UnitConverterPro/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.appfactory.unitconverterpro
        PRODUCT_NAME: UnitConverterPro
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES

schemes:
  UnitConverterPro:
    build:
      targets:
        UnitConverterPro: all
    run:
      config: Debug
    archive:
      config: Release
