<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#3730A3"/>
    </linearGradient>
    <linearGradient id="ruler" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E0E7FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Diagonal ruler -->
  <g transform="rotate(-45 512 512)">
    <rect x="232" y="432" width="560" height="160" rx="24" fill="url(#ruler)"/>
    <!-- Tick marks -->
    <g fill="#4F46E5">
      <rect x="288" y="432" width="14" height="78"/>
      <rect x="344" y="432" width="14" height="52"/>
      <rect x="400" y="432" width="14" height="78"/>
      <rect x="456" y="432" width="14" height="52"/>
      <rect x="512" y="432" width="14" height="78"/>
      <rect x="568" y="432" width="14" height="52"/>
      <rect x="624" y="432" width="14" height="78"/>
      <rect x="680" y="432" width="14" height="52"/>
      <rect x="736" y="432" width="14" height="78"/>
    </g>
  </g>

  <!-- Conversion arrows -->
  <g stroke="#F97316" stroke-width="56" stroke-linecap="round" fill="none">
    <!-- Top arrow pointing right -->
    <path d="M 320 392 L 660 392"/>
    <path d="M 600 332 L 668 392 L 600 452"/>
    <!-- Bottom arrow pointing left -->
    <path d="M 704 632 L 364 632"/>
    <path d="M 424 572 L 356 632 L 424 692"/>
  </g>
</svg>
