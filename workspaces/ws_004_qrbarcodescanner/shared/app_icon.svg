<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <title>QR &amp; Barcode Scanner+ app icon</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A84FF"/>
      <stop offset="1" stop-color="#0040A8"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34C759" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#34C759" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#34C759" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>

  <!-- Scan-frame corner brackets (the visual signature) -->
  <g stroke="#FFFFFF" stroke-width="46" stroke-linecap="round" fill="none">
    <!-- top-left -->
    <path d="M232 360 L232 232 L360 232"/>
    <!-- top-right -->
    <path d="M664 232 L792 232 L792 360"/>
    <!-- bottom-left -->
    <path d="M232 664 L232 792 L360 792"/>
    <!-- bottom-right -->
    <path d="M792 664 L792 792 L664 792"/>
  </g>

  <!-- Mini QR matrix inside the frame -->
  <g fill="#FFFFFF">
    <!-- finder patterns -->
    <rect x="318" y="318" width="118" height="118" rx="14"/>
    <rect x="588" y="318" width="118" height="118" rx="14"/>
    <rect x="318" y="588" width="118" height="118" rx="14"/>
  </g>
  <g fill="url(#bg)">
    <rect x="348" y="348" width="58" height="58" rx="8"/>
    <rect x="618" y="348" width="58" height="58" rx="8"/>
    <rect x="348" y="618" width="58" height="58" rx="8"/>
  </g>
  <g fill="#FFFFFF">
    <rect x="364" y="364" width="26" height="26" rx="4"/>
    <rect x="634" y="364" width="26" height="26" rx="4"/>
    <rect x="364" y="634" width="26" height="26" rx="4"/>
    <!-- data modules -->
    <rect x="486" y="318" width="40" height="40" rx="6"/>
    <rect x="486" y="382" width="40" height="40" rx="6"/>
    <rect x="540" y="486" width="40" height="40" rx="6"/>
    <rect x="486" y="540" width="40" height="40" rx="6"/>
    <rect x="588" y="540" width="40" height="40" rx="6"/>
    <rect x="652" y="588" width="40" height="40" rx="6"/>
    <rect x="588" y="652" width="40" height="40" rx="6"/>
    <rect x="652" y="652" width="40" height="40" rx="6"/>
    <rect x="318" y="486" width="40" height="40" rx="6"/>
  </g>

  <!-- Green scan beam sweeping across the matrix -->
  <rect x="232" y="486" width="560" height="52" fill="url(#beam)" filter="url(#soft)"/>
  <rect x="232" y="506" width="560" height="12" rx="6" fill="#34C759"/>
</svg>
