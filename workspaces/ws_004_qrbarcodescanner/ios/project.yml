name: QRBarcodeScanner
options:
  bundleIdPrefix: com.appfactory
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_LANGUAGE: en
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  QRBarcodeScanner:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: QRBarcodeScanner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.appfactory.qrbarcodescanner
        PRODUCT_NAME: QRBarcodeScanner
        INFOPLIST_FILE: QRBarcodeScanner/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
schemes:
  QRBarcodeScanner:
    build:
      targets:
        QRBarcodeScanner: all
    run:
      config: Debug
    archive:
      config: Release
