<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024"
     viewBox="0 0 1024 1024">
  <!--
    Pomodoro Focus Timer — master app icon (1024x1024).
    Theme: a tomato (the "pomodoro") whose body doubles as a focus timer ring.
    Distinct from other factory apps: warm-red tomato + teal leaf + white
    progress ring with a single tick at the 12 o'clock position.
  -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#2A1C1C"/>
      <stop offset="100%" stop-color="#120D0D"/>
    </radialGradient>
    <radialGradient id="tomato" cx="40%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#FF8A8A"/>
      <stop offset="55%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#E04F4F"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5FE0D6"/>
      <stop offset="100%" stop-color="#3FB0A8"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Tomato body -->
  <circle cx="512" cy="560" r="312" fill="url(#tomato)"/>

  <!-- Soft highlight -->
  <ellipse cx="404" cy="430" rx="120" ry="92" fill="#FFFFFF" opacity="0.22"/>

  <!-- Leafy stalk: five blades + stem -->
  <g fill="url(#leaf)">
    <path d="M512 268 L470 196 Q512 168 554 196 Z"/>
    <path d="M470 286 L388 248 Q420 196 480 230 Z"/>
    <path d="M554 286 L636 248 Q604 196 544 230 Z"/>
    <path d="M438 312 L356 320 Q372 262 448 274 Z"/>
    <path d="M586 312 L668 320 Q652 262 576 274 Z"/>
  </g>
  <rect x="500" y="236" width="24" height="60" rx="12" fill="#3FB0A8"/>

  <!-- Focus timer ring on the tomato body -->
  <circle cx="512" cy="560" r="208" fill="none" stroke="#FFFFFF"
          stroke-width="34" stroke-opacity="0.22"/>
  <!-- Progress arc: ~70% sweep, rounded caps, starting at 12 o'clock -->
  <path d="M 512 352
           A 208 208 0 1 1 327 666"
        fill="none" stroke="#FFFFFF" stroke-width="34"
        stroke-linecap="round"/>

  <!-- Progress start marker -->
  <circle cx="512" cy="352" r="30" fill="#FFFFFF"/>

  <!-- Center hand pointer -->
  <circle cx="512" cy="560" r="26" fill="#FFFFFF"/>
  <rect x="500" y="430" width="24" height="146" rx="12" fill="#FFFFFF"/>
</svg>
