name: SoundLevelMeter
options:
  bundleIdPrefix: com.appfactory
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.42.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_LANG: en

targets:
  SoundLevelMeter:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: SoundLevelMeter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.appfactory.soundlevelmeter
        PRODUCT_NAME: SoundLevelMeter
        INFOPLIST_FILE: SoundLevelMeter/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic
    info:
      path: SoundLevelMeter/Info.plist

schemes:
  SoundLevelMeter:
    build:
      targets:
        SoundLevelMeter: all
    run:
      config: Debug
    archive:
      config: Release
