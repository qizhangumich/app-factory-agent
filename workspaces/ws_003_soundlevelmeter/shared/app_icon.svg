<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0FB9B1"/>
      <stop offset="1" stop-color="#0A7E78"/>
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34C759"/>
      <stop offset="0.55" stop-color="#FF9500"/>
      <stop offset="1" stop-color="#FF3B30"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Background tile -->
  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>

  <!-- Concentric sound waves emanating from the gauge hub -->
  <g fill="none" stroke="#FFFFFF" stroke-linecap="round" opacity="0.16">
    <path d="M512 760 m-300 0 a300 300 0 0 1 600 0" stroke-width="16"/>
    <path d="M512 760 m-390 0 a390 390 0 0 1 780 0" stroke-width="14"/>
    <path d="M512 760 m-470 0 a470 470 0 0 1 940 0" stroke-width="12"/>
  </g>

  <!-- Semicircular gauge arc -->
  <g filter="url(#soft)">
    <path d="M212 612 A300 300 0 0 1 812 612"
          fill="none" stroke="#0A5B57" stroke-width="64" stroke-linecap="round"/>
    <path d="M212 612 A300 300 0 0 1 812 612"
          fill="none" stroke="url(#arc)" stroke-width="48" stroke-linecap="round"/>
  </g>

  <!-- Tick marks around the arc -->
  <g stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity="0.9">
    <line x1="246" y1="540" x2="290" y2="560"/>
    <line x1="330" y1="430" x2="362" y2="466"/>
    <line x1="452" y1="364" x2="468" y2="408"/>
    <line x1="572" y1="364" x2="556" y2="408"/>
    <line x1="694" y1="430" x2="662" y2="466"/>
    <line x1="778" y1="540" x2="734" y2="560"/>
  </g>

  <!-- Animated-style needle pointing into the moderate zone -->
  <g filter="url(#soft)">
    <line x1="512" y1="612" x2="636" y2="392"
          stroke="#FFFFFF" stroke-width="26" stroke-linecap="round"/>
    <circle cx="512" cy="612" r="48" fill="#FFFFFF"/>
    <circle cx="512" cy="612" r="22" fill="#FF9500"/>
  </g>

  <!-- "dB" wordmark -->
  <text x="512" y="788" text-anchor="middle"
        font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="150" font-weight="800" fill="#FFFFFF" letter-spacing="4">dB</text>
</svg>
